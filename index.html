<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>What Should Noiseredux Play?</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --ps-blue: #003087;
      --ps-blue-light: #0070cc;
      --nin-red: #e4000f;
      --bg: #ffffff;
      --surface2: #e2e2ea;
      --text: #111118;
      --text-muted: #8888aa;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, var(--ps-blue) 0%, #001a55 50%, #1a0005 100%);
      border-bottom: 3px solid var(--nin-red);
      padding: 2rem 1.5rem 1.75rem;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    header::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 30% 50%, rgba(0,112,204,0.25) 0%, transparent 60%),
                  radial-gradient(ellipse at 70% 50%, rgba(228,0,15,0.15) 0%, transparent 60%);
      pointer-events: none;
    }

    header h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2rem, 6vw, 4rem);
      letter-spacing: 0.04em;
      color: #fff;
      position: relative;
      line-height: 1;
    }

    header p.version {
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.4);
      margin-top: 0.4rem;
      position: relative;
    }

    main {
      max-width: 900px;
      margin: 0 auto;
      padding: 2rem 1rem 4rem;
    }

    .year-block {
      margin-bottom: 2.5rem;
    }

    .year-block + .year-block {
      padding-top: 0.25rem;
      border-top: 1px solid #dcdce8;
    }

    .year-label {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.6rem;
      letter-spacing: 0.08em;
      border-left: 3px solid var(--nin-red);
      padding-left: 0.6rem;
      margin-bottom: 0.75rem;
      line-height: 1;
    }

    .year-label a {
      color: var(--ps-blue);
      text-decoration: none;
      transition: color 0.2s ease;
    }

    .year-label a:hover {
      color: var(--ps-blue-light);
    }

    .cover-row {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 0.5rem;
    }

    .cover-wrap {
      position: relative;
      border-radius: 4px;
      overflow: hidden;
      background: var(--surface2);
      aspect-ratio: 3 / 4;
    }

    .cover-wrap a {
      display: block;
      width: 100%;
      height: 100%;
    }

    .cover-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.25s ease, filter 0.25s ease;
    }

    .cover-wrap:hover img {
      transform: scale(1.04);
      filter: brightness(0.75);
    }

    .cover-wrap .tooltip {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(0,0,0,0.88);
      color: #fff;
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.02em;
      padding: 0.4rem 0.5rem;
      text-align: center;
      opacity: 0;
      transition: opacity 0.2s ease;
      line-height: 1.3;
      pointer-events: none;
    }

    .cover-wrap:hover .tooltip {
      opacity: 1;
    }

    .cover-placeholder {
      width: 100%;
      height: 100%;
      background: var(--surface2);
      border: 1px solid #d0d0de;
      border-radius: 4px;
    }

    .status-bar {
      text-align: center;
      padding: 1.5rem;
      font-size: 0.8rem;
      color: var(--text-muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    @media (max-width: 600px) {
      .cover-row { gap: 0.35rem; }
      .year-label { font-size: 1.25rem; }
      .cover-wrap .tooltip { font-size: 0.55rem; padding: 0.3rem 0.35rem; }
    }

    @media (max-width: 380px) {
      .cover-row { gap: 0.25rem; }
    }
  </style>
</head>
<body>

<header>
  <h1>What Should Noiseredux Play?</h1>
  <p class="version">v2.0 &nbsp;·&nbsp; Top 5 by Year</p>
</header>

<main id="main">
  <div class="status-bar" id="status">Loading lists…</div>
</main>

<script>
  var SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbywUCjU0koBGdz9Il9GMS35uCu6a61tNUVXcMe-354WAlccH-kqGAFvWEvBBd5XNwMX/exec';
  var START_YEAR = 1977;
  var END_YEAR = new Date().getFullYear();

  function makePlaceholder() {
    var div = document.createElement('div');
    div.className = 'cover-placeholder';
    return div;
  }

  function buildYearBlock(year) {
    var block = document.createElement('div');
    block.className = 'year-block';
    block.id = 'year-' + year;

    var label = document.createElement('div');
    label.className = 'year-label';

    var labelLink = document.createElement('a');
    labelLink.href = 'https://backloggd.com/u/noiseredux/list/' + year + '/';
    labelLink.target = '_blank';
    labelLink.rel = 'noopener noreferrer';
    labelLink.textContent = year;
    label.appendChild(labelLink);

    var row = document.createElement('div');
    row.className = 'cover-row';

    for (var i = 0; i < 5; i++) {
      var wrap = document.createElement('div');
      wrap.className = 'cover-wrap';
      wrap.appendChild(makePlaceholder());
      row.appendChild(wrap);
    }

    block.appendChild(label);
    block.appendChild(row);
    return block;
  }

  function fillRow(row, games) {
    var slots = row.querySelectorAll('.cover-wrap');
    for (var i = 0; i < slots.length; i++) {
      slots[i].innerHTML = '';
      if (games[i]) {
        var g = games[i];
        var a = document.createElement('a');
        a.href = g.url;
        a.target = '_blank';
        a.rel = 'noopener noreferrer';

        var img = document.createElement('img');
        img.src = g.cover;
        img.alt = g.title;
        img.loading = 'lazy';

        var tip = document.createElement('span');
        tip.className = 'tooltip';
        tip.textContent = g.title;

        a.appendChild(img);
        a.appendChild(tip);
        slots[i].appendChild(a);
      } else {
        slots[i].appendChild(makePlaceholder());
      }
    }
  }

  function loadNext(years, index) {
    if (index >= years.length) return;
    var year = years[index];
    fetch(SCRIPT_URL + '?year=' + year)
      .then(function(res) { return res.json(); })
      .then(function(data) {
        var block = document.getElementById('year-' + year);
        var row = block.querySelector('.cover-row');
        fillRow(row, data.games || []);
      })
      .catch(function(err) {
        console.warn('Failed to load ' + year + ':', err);
      })
      .then(function() {
        setTimeout(function() { loadNext(years, index + 1); }, 100);
      });
  }

  function init() {
    var container = document.getElementById('main');
    var statusDiv = document.getElementById('status');
    var years = [];

    for (var y = END_YEAR; y >= START_YEAR; y--) {
      years.push(y);
      container.appendChild(buildYearBlock(y));
    }

    statusDiv.textContent = '';
    loadNext(years, 0);
  }

  window.onload = init;
</script>
</body>
</html>
